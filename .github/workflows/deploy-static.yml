name: Deploy Static Site

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment to deploy from.
        type: choice
        options:
          - dev
          - production
        default: production
      release_ref:
        description: Git ref to deploy. Dev may use a branch; production must use a SemVer tag such as v0.1.0.
        type: string
        required: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-static-${{ inputs.environment }}-${{ inputs.release_ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build And Upload
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      SITE_BUCKET: ${{ vars.SITE_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
      VITE_PUBLIC_SITE_URL: ${{ vars.VITE_PUBLIC_SITE_URL }}
      VITE_PUBLIC_API_BASE_URL: ${{ vars.VITE_PUBLIC_API_BASE_URL }}
      VITE_PUBLIC_COLLECTION_MODE: ${{ vars.VITE_PUBLIC_COLLECTION_MODE || 'preview' }}
      VITE_PUBLIC_RELEASE_REF: ${{ inputs.release_ref }}
      VITE_PUBLIC_SURVEY_ID: ${{ vars.VITE_PUBLIC_SURVEY_ID || 'optbot-study-v1' }}
      VITE_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.VITE_PUBLIC_TURNSTILE_SITE_KEY }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_ref }}
      - name: Record checked-out build
        run: echo "VITE_PUBLIC_BUILD_SHA=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_ENV"
      - name: Check deploy configuration
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            if [[ ! "${{ inputs.release_ref }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Production deploys must use an immutable SemVer tag such as v0.1.0."
              exit 1
            fi
            if [ -z "$VITE_PUBLIC_SITE_URL" ]; then
              echo "VITE_PUBLIC_SITE_URL=https://optbot.study" >> "$GITHUB_ENV"
              VITE_PUBLIC_SITE_URL="https://optbot.study"
            fi
          fi
          if [ "${{ inputs.environment }}" = "dev" ]; then
            if [ -z "$VITE_PUBLIC_SITE_URL" ]; then
              echo "Set VITE_PUBLIC_SITE_URL on the dev GitHub Environment to a non-production URL."
              echo "Use a restricted subdomain such as https://dev.optbot.study or the dev CloudFront URL."
              exit 1
            fi
            if [[ "$VITE_PUBLIC_SITE_URL" =~ ^https?://optbot\.study/?$ ]]; then
              echo "Dev deploys must not use the live root domain optbot.study."
              exit 1
            fi
          fi
          if [[ ! "$VITE_PUBLIC_COLLECTION_MODE" =~ ^(preview|live)$ ]]; then
            echo "VITE_PUBLIC_COLLECTION_MODE must be preview or live."
            exit 1
          fi
          if [ "$VITE_PUBLIC_COLLECTION_MODE" = "live" ] && [ -z "$VITE_PUBLIC_API_BASE_URL" ]; then
            echo "Live collection requires VITE_PUBLIC_API_BASE_URL."
            exit 1
          fi
          if [ -z "$AWS_ROLE_TO_ASSUME" ] || [ -z "$SITE_BUCKET" ] || [ -z "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
            echo "Set AWS_ROLE_TO_ASSUME, SITE_BUCKET, and CLOUDFRONT_DISTRIBUTION_ID on the selected GitHub Environment."
            echo "This workflow is manual and should be protected with required reviewers before production use."
            exit 1
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - run: ./scripts/deploy-static.sh
