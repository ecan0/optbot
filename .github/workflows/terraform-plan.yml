name: Terraform Plan

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment to use for AWS role and state settings.
        type: choice
        options:
          - dev
          - production
        default: dev
      use_remote_state:
        description: Initialize Terraform with TF_BACKEND_CONFIG_B64 from the selected environment.
        type: boolean
        default: false
      enable_turnstile:
        description: Plan production Turnstile enforcement using the existing SSM SecureString.
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-plan-${{ inputs.environment }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true

jobs:
  plan:
    name: Speculative Plan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}
      TF_BACKEND_CONFIG_B64: ${{ secrets.TF_BACKEND_CONFIG_B64 || vars.TF_BACKEND_CONFIG_B64 }}
      TF_VAR_acm_certificate_arn: ${{ secrets.TF_VAR_ACM_CERTIFICATE_ARN || vars.TF_VAR_ACM_CERTIFICATE_ARN }}
      TF_VAR_require_turnstile: ${{ inputs.enable_turnstile && 'true' || 'false' }}
      TF_VAR_turnstile_secret_parameter_name: ${{ inputs.enable_turnstile && '/optbot/turnstile/secret' || '' }}
      VITE_PUBLIC_API_BASE_URL: ${{ vars.VITE_PUBLIC_API_BASE_URL }}
      SITE_BUCKET: ${{ secrets.SITE_BUCKET || vars.SITE_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID || vars.CLOUDFRONT_DISTRIBUTION_ID }}
    defaults:
      run:
        working-directory: infra/aws
    steps:
      - uses: actions/checkout@v7
      - name: Check cloud configuration
        run: |
          if [ -z "$AWS_ROLE_TO_ASSUME" ]; then
            echo "Set AWS_ROLE_TO_ASSUME on the selected GitHub Environment before running Terraform plans."
            exit 1
          fi
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v4
      - name: Terraform init
        run: |
          if [ "${{ inputs.use_remote_state }}" = "true" ]; then
            if [ -z "$TF_BACKEND_CONFIG_B64" ]; then
              echo "Set TF_BACKEND_CONFIG_B64 on the selected GitHub Environment before using remote state."
              exit 1
            fi
            echo "$TF_BACKEND_CONFIG_B64" | base64 -d > backend.hcl
            terraform init -input=false -backend-config=backend.hcl
          else
            terraform init -backend=false -input=false
          fi
      - name: Check production resources
        if: inputs.environment == 'production' && inputs.use_remote_state
        run: |
          table_name="$(terraform output -raw responses_table_name)"
          api_endpoint="$(terraform output -raw responses_api_endpoint)"
          site_bucket="$(terraform output -raw site_bucket_name)"
          distribution_id="$(terraform output -raw cloudfront_distribution_id)"

          test "$api_endpoint" = "$VITE_PUBLIC_API_BASE_URL"
          test "$site_bucket" = "$SITE_BUCKET"
          test "$distribution_id" = "$CLOUDFRONT_DISTRIBUTION_ID"
          test "$(aws dynamodb describe-time-to-live --table-name "$table_name" --query 'TimeToLiveDescription.TimeToLiveStatus' --output text)" = "ENABLED"
          test "$(aws dynamodb describe-time-to-live --table-name "$table_name" --query 'TimeToLiveDescription.AttributeName' --output text)" = "expires_at"
          test "$(aws dynamodb describe-continuous-backups --table-name "$table_name" --query 'ContinuousBackupsDescription.PointInTimeRecoveryDescription.PointInTimeRecoveryStatus' --output text)" = "ENABLED"
          test "$(aws s3api get-bucket-versioning --bucket "$site_bucket" --query Status --output text)" = "Enabled"
          test "$(aws cloudfront get-distribution --id "$distribution_id" --query 'Distribution.DistributionConfig.Enabled' --output text)" = "True"
          test "$(aws cloudfront get-distribution --id "$distribution_id" --query 'contains(Distribution.DistributionConfig.Aliases.Items, `optbot.study`)' --output text)" = "True"

          if [ "${{ inputs.enable_turnstile }}" = "true" ]; then
            test "$(aws ssm get-parameter --name /optbot/turnstile/secret --with-decryption --query Parameter.Type --output text)" = "SecureString"
          fi

          echo "Production API, response retention, PITR, versioned static delivery, custom domain, and optional Turnstile secret checks passed."
      - run: terraform validate
      - name: Require remote state for production enforcement
        if: inputs.environment == 'production' && inputs.enable_turnstile && !inputs.use_remote_state
        run: |
          echo "Production Turnstile plans require remote state."
          exit 1
      - name: Terraform plan
        run: terraform plan -input=false -no-color -var-file=terraform.tfvars.example -var "acm_certificate_arn=$TF_VAR_acm_certificate_arn" -out=tfplan > terraform-plan.log
      - name: Review sanitized plan
        run: |
          terraform show -json tfplan > tfplan.json
          python ../../scripts/validate-turnstile-plan.py tfplan.json "${{ inputs.enable_turnstile }}"
      - name: Remove private plan material
        if: always()
        run: rm -f backend.hcl tfplan tfplan.json terraform-plan.log
