name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: true

jobs:
  app:
    name: App
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run audit:deps
      - uses: actions/upload-artifact@v7
        with:
          name: optbot-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

  public-boundary:
    name: Public Boundary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - run: python scripts/check-public-boundary.py

  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: infra/aws
    steps:
      - uses: actions/checkout@v7
      - run: python -m unittest discover -s lambda -p 'test_*.py'
      - run: python -m unittest discover -s glue -p 'test_*.py'
      - run: python ../../scripts/test_validate_analytics_plan.py
      - uses: hashicorp/setup-terraform@v4
      - run: terraform fmt -check
      - run: terraform init -backend=false -input=false
      - run: terraform validate
