name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build Release Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Check release tag
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH, for example v0.1.0."
            exit 1
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: tar -czf optbot-dist-${{ github.ref_name }}.tar.gz dist/
      - uses: actions/upload-artifact@v4
        with:
          name: optbot-dist-${{ github.ref_name }}
          path: optbot-dist-${{ github.ref_name }}.tar.gz
          if-no-files-found: error
          retention-days: 30
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "OptBot ${{ github.ref_name }}" \
            --notes "Validated static site artifact for ${{ github.ref_name }}." \
            "optbot-dist-${{ github.ref_name }}.tar.gz"
